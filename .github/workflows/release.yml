name: Release
on:
  push:
    tags: ["v*"]
jobs:
  desktop:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: build client
        run: cd core && cargo build --release
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          # 注意：本仓库是单一 Cargo 工作区，产物落在工作区根的 target/release/ 而非 core/target/
          path: target/release/rdcore-desktop*
  cloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd cloud && cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: cloud
          path: cloud/target/release/

  # Windows 受控端 NSIS 安装包（RdCore-Host-Setup.exe）
  # 前置：windows-latest 自带 MSVC；另需 nasm(openh264 编译) 与 NSIS(makensis)。
  installer-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install NSIS + NASM
        run: choco install -y nsis nasm
      - name: Build installer
        shell: bash
        run: bash scripts/build_installer_nsis.sh
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: rdcore-host-setup-windows
          path: scripts/installer/RdCore-Host-Setup.exe
