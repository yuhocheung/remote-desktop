<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 680 380" width="680" height="380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Transport channels over one connection</title>
<desc>实测结构：1 路 RTP 视频轨道 + 3 条协商式 DataChannel（media=0 兜底 / control=1 控制面总线 / audio=2 音频）。控制面负载全部 AEAD 加密；无 unreliable 通道。</desc>
<style>
text{font-family:"Microsoft YaHei","PingFang SC","Noto Sans CJK SC",sans-serif;}
.t{font-size:14px;fill:#2C2C2A;}
.ts{font-size:12px;fill:#5F5E5A;}
.th{font-size:14px;font-weight:500;fill:#2C2C2A;}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0" y="0" width="680" height="380" fill="#FFFFFF"/>
<rect x="30" y="150" width="120" height="80" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text class="th" x="90" y="182" text-anchor="middle">Viewer</text>
<text class="ts" x="90" y="202" text-anchor="middle">(you)</text>
<rect x="530" y="150" width="120" height="80" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="590" y="182" text-anchor="middle">Host</text>
<text class="ts" x="590" y="202" text-anchor="middle">(remote)</text>
<path d="M530,70 L152,70" fill="none" stroke="#D85A30" stroke-width="1.8" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="62" text-anchor="middle">RTP video · 屏幕 H.264 · 不可靠低延迟 · 丢帧请求关键帧（PLI/FIR）</text>
<path d="M530,130 L152,130" fill="none" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="122" text-anchor="middle">DC#0 media · 媒体兜底：AEAD 加密帧（RTP 不可用时）</text>
<path d="M150,190 L528,190" fill="none" stroke="#378ADD" stroke-width="1.8" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="182" text-anchor="middle">DC#1 control · 输入（键鼠）· 可靠 + 有序（否则丢 key down 卡键）</text>
<path d="M150,250 L528,250" fill="none" stroke="#888780" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M528,250 L150,250" fill="none" stroke="#888780" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="242" text-anchor="middle">同一条 control · 剪贴板/文件（consent 逐次同意）· 心跳 · 负载全部 AEAD 加密</text>
<path d="M530,310 L152,310" fill="none" stroke="#1D9E75" stroke-width="1.8" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="302" text-anchor="middle">DC#2 audio · 音频 · 与视频平行、互不阻塞</text>
<text class="th" x="340" y="352" text-anchor="middle">One WebRTC PeerConnection · 1 RTP track + 3 negotiated DataChannels（id=0/1/2）</text>
<text class="ts" x="340" y="370" text-anchor="middle">control 一统控制面（输入/剪贴板/文件/心跳）· 无 unreliable 通道，输入可靠 + 有序</text>
</svg>
