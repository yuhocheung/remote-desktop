# coturn 备用配置文件（若 docker-compose.yml 的 command 不够用时挂载覆盖）。
# 启用方式：注释掉 compose 里 coturn 的 command，使用本文件（已默认挂载到容器内路径）。

listening-port=3478
realm=rdcore
# 生产强烈建议改用 use-auth-secret + static-auth-secret（REST 动态凭据），
# 替换 compose 中的静态 --user，避免凭据硬编码。
# use-auth-secret
# static-auth-secret=change-me
min-port=49152
max-port=65535
no-tcp-relay
log-file=stdout
verbose
